name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e .
      - name: Build Windows executable
        run: flet pack desktop_ep.py --out-dir dist --icon src/subconscious/assets/favicon.ico --name Subconscious --add-data src/subconscious;subconscious --hidden-import desktop_notifier.resources --hidden-import desktop_notifier.backends.winrt --hidden-import pydantic_core --hidden-import aiosqlite --pyinstaller-build-args=--collect-all=pydantic --pyinstaller-build-args=--collect-all=pydantic_core --pyinstaller-build-args=--copy-metadata=genai_prices --pyinstaller-build-args=--copy-metadata=pydantic_ai_slim --pyinstaller-build-args=--copy-metadata=pydantic-ai-slim --pyinstaller-build-args=--copy-metadata=pydantic_ai --pyinstaller-build-args=--copy-metadata=pydantic-ai --pyinstaller-build-args=--exclude-module=google.genai.types --pyinstaller-build-args=--console
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/

  publish-python:
    needs: [build-python, build-windows]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    needs: [publish-python]
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: Subconscious.Subconscious
          token: ${{ secrets.GITHUB_TOKEN }}
