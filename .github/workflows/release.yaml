name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
  
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e .

      # Stamp build_metadata.json so the running app knows it was installed via winget/NSIS
      - name: Stamp build metadata (winget)
        run: Copy-Item deploy\build_metadata\winget.json src\subconscious\assets\build_metadata.json
        shell: pwsh

      - name: Build Windows executable (flet pack / PyInstaller)
        run: flet pack src/subconscious/desktop_ep.py --out-dir dist --icon src/subconscious/assets/favicon.ico --name Subconscious --add-data "src/subconscious;subconscious" --add-data "LICENCE;." --add-data "THIRD_PARTY_LICENSES.md;." --add-data "LGPL_COMPLIANCE.md;." --add-data "README.md;." --hidden-import desktop_notifier.resources --hidden-import desktop_notifier.backends.winrt --hidden-import pydantic_core --hidden-import aiosqlite --pyinstaller-build-args=--collect-all=pydantic --pyinstaller-build-args=--collect-all=pydantic_core --pyinstaller-build-args=--copy-metadata=genai_prices --pyinstaller-build-args=--copy-metadata=pydantic_ai_slim --pyinstaller-build-args=--copy-metadata=pydantic-ai-slim --pyinstaller-build-args=--copy-metadata=pydantic_ai --pyinstaller-build-args=--copy-metadata=pydantic-ai --pyinstaller-build-args=--copy-metadata=pydantic --pyinstaller-build-args=--copy-metadata=pydantic_graph --pyinstaller-build-args=--copy-metadata=griffe --pyinstaller-build-args=--copy-metadata=opentelemetry_api --pyinstaller-build-args=--copy-metadata=typing_inspection --pyinstaller-build-args=--exclude-module=google.genai.types --pyinstaller-build-args=--noconsole

      # Patch the version number into the NSIS script, then build the installer
      - name: Get release version
        id: get_version
        run: echo "VERSION=${{ github.event.release.tag_name }}" | Out-File -FilePath $Env:GITHUB_ENV -Append
        shell: pwsh
      - name: Install NSIS
        run: choco install nsis --no-progress -y
      - name: Build NSIS installer
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          (Get-Content deploy\windows\installer.nsi) -replace '!define APP_VERSION\s+"[^"]+"', "!define APP_VERSION `"$version`"" | Set-Content deploy\windows\installer.nsi
          New-Item -ItemType Directory -Force -Path dist\windows
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 deploy\windows\installer.nsi
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/windows/subconscious-setup-x64.exe

  publish-python:
    needs: [build-python]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
      - name: Attach Python artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-windows-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/windows/
      - name: Attach Windows installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/subconscious-setup-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-winget-manifest:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/windows/
      - name: Update winget manifest version/url/sha
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION=$(python -c "import re; from pathlib import Path; text=Path('deploy/winget/manifest.yaml').read_text(encoding='utf-8'); m=re.search(r'^PackageVersion:\\s*([^\\n]+)$', text, flags=re.M); print(m.group(1).strip() if m else '0.0.0')")
          fi

          SHA=$(sha256sum dist/windows/subconscious-setup-x64.exe | awk '{print toupper($1)}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/subconscious-setup-x64.exe"

          VERSION="$VERSION" URL="$URL" SHA="$SHA" python -c "import os,re; from pathlib import Path; manifest=Path('deploy/winget/manifest.yaml'); text=manifest.read_text(encoding='utf-8'); version=os.environ['VERSION']; url=os.environ['URL']; sha=os.environ['SHA']; text=re.sub(r'^PackageVersion:\\s*.*$', f'PackageVersion: {version}', text, flags=re.M); text=re.sub(r'^(\\s+InstallerUrl:)\\s*.*$', rf'\\1 {url}', text, flags=re.M); text=re.sub(r'^(\\s+InstallerSha256:)\\s*.*$', rf'\\1 {sha}', text, flags=re.M); manifest.write_text(text, encoding='utf-8')"
      - name: Commit updated winget manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/winget/manifest.yaml
          git diff --staged --quiet || git commit -m "chore(winget): update manifest sha/url/version for release"
          git push

  publish-winget:
    needs: [attach-windows-release, update-winget-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Ancilla.Subconscious-Chat
          token: ${{ secrets.GITHUB_TOKEN }}
          