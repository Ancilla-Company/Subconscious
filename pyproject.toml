[project]
name = "subconscious"
version = "0.1.0"
description = "A distributed agentic engine"
authors = [
  { name = "Brian Branch", email = "you@example.com" }
]
dependencies = [
  "httpx",
  "bcrypt",
  "pytest",
  "pyyaml",
  "fastapi",
  "keyring",
  "aiosqlite",
  "flet[all]",
  "sqlalchemy",
  "pydantic-ai",
  "pytest-asyncio",
  
  "bs4",
  "python-docx",
  "pypdf",
  "openpyxl",
  "pyperclip",
  "speedtest-cli",
  "send2trash"
]
requires-python = ">=3.12"

[project.scripts]
subconscious = "subconscious.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
